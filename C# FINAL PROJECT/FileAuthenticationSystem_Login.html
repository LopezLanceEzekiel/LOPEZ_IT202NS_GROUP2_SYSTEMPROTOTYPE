<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFMAS — Sign In</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

        :root {
            --bg: #0d0f14;
            --card: #13161e;
            --border: #2a2f3e;
            --text: #e8eaf0;
            --text-dim: #8b91a8;
            --accent: #4f8ef7;
            --accent-hover: #3b7ce6;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(79, 142, 247, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(62, 207, 142, 0.03) 0%, transparent 40%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .brand {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .brand span { color: var(--accent); }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #090b10;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.1);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .forgot {
            color: var(--accent);
            text-decoration: none;
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">IF<span>MAS</span></div>
        <p class="subtitle">Secure Document Gateway</p>

        <form onsubmit="return false;">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" placeholder="e.g. admin_01" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" style="width: auto;"> Remember me
                </label>
                <a href="#" class="forgot">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="footer-note">
            Institutional Access Only. <br>
            Contact System Admin for account recovery.
        </div>
    </div>

</body>
</html>
